<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Redirect</title>
</head>
<body>
  <p>Redirecting to the app...</p>
  <script>
    (function () {
      // const APP_CALLBACK = "http://localhost:5173/wfm-authenticate";
      const APP_CALLBACK = "https://preview-auhmhscsbqdvejfa.australiacentral-01.azurewebsites.net/wfm-authenticate";

      const params = new URLSearchParams(window.location.search);
      if (!params.has("code") || !params.has("state")) {
        document.body.innerHTML =
          "<p>Authorization incomplete. Missing <code>code</code> or <code>state</code> from WorkflowMax.</p>";
        return;
      }

      var next = new URL(APP_CALLBACK);
      next.search = window.location.search;
      window.location.replace(next.toString());
    })();
  </script>
</body>
</html>
